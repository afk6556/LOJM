<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Monopoly ONLINE | Два игрока на расстоянии</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at 10% 30%, #0a0f1e, #03060c);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-container {
            max-width: 1300px;
            width: 100%;
            background: rgba(15, 25, 45, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            border: 1px solid #0ff;
            box-shadow: 0 0 30px rgba(0,255,255,0.2);
            padding: 20px;
        }
        .join-panel {
            text-align: center;
            padding: 20px;
        }
        .join-panel input, .join-panel button {
            padding: 12px 24px;
            font-size: 1.2rem;
            margin: 10px;
            border-radius: 60px;
            border: none;
            background: #1e2a3a;
            color: cyan;
            font-weight: bold;
        }
        .join-panel button {
            background: cyan;
            color: black;
            cursor: pointer;
        }
        .players-panel {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .player-card {
            flex: 1;
            background: #0a1425;
            border-radius: 32px;
            padding: 16px;
            border: 1px solid #0ff;
        }
        .player-card.active {
            border-color: yellow;
            box-shadow: 0 0 15px yellow;
        }
        .money {
            font-size: 1.8rem;
            font-weight: bold;
            color: gold;
        }
        .props-list {
            font-size: 0.7rem;
            max-height: 70px;
            overflow-y: auto;
            background: #00000088;
            border-radius: 20px;
            padding: 6px;
        }
        .board {
            background: #031020;
            border-radius: 32px;
            padding: 16px;
            margin: 20px 0;
        }
        .cells-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
        }
        .cell {
            background: #11213a;
            border-radius: 20px;
            padding: 8px 4px;
            text-align: center;
            font-size: 0.7rem;
            font-weight: bold;
            border: 1px solid cyan;
            position: relative;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .cell-name {
            background: #00adb5;
            border-radius: 30px;
            padding: 2px;
            font-size: 0.65rem;
        }
        .owner {
            font-size: 0.55rem;
            background: #2f4858;
            border-radius: 20px;
            margin-top: 4px;
        }
        .improvement {
            font-size: 0.55rem;
            background: black;
            border-radius: 20px;
            padding: 2px;
        }
        .pawns {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 6px;
        }
        .pawn {
            width: 24px;
            height: 24px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .pawn-p0 { background: #ff4d6d; color: white; }
        .pawn-p1 { background: #4d9de0; color: white; }
        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        button {
            background: linear-gradient(135deg, #1f2b3c, #121b2a);
            border: none;
            color: cyan;
            font-weight: bold;
            padding: 10px 24px;
            border-radius: 60px;
            cursor: pointer;
            font-size: 1rem;
        }
        button:active { transform: scale(0.97); }
        .dice-area {
            background: black;
            padding: 8px 24px;
            border-radius: 60px;
            font-size: 2rem;
            letter-spacing: 8px;
        }
        .msg {
            background: #0a1122dd;
            border-radius: 40px;
            padding: 12px;
            margin-top: 20px;
            text-align: center;
            color: #aaf0ff;
        }
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-card {
            background: #111c2f;
            border-radius: 32px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            border: 2px solid cyan;
        }
        .bid-input {
            font-size: 1.2rem;
            padding: 8px;
            border-radius: 40px;
            width: 140px;
            text-align: center;
            margin: 10px;
        }
        .flex { display: flex; gap: 12px; justify-content: center; margin-top: 16px; }
        @media (max-width: 700px) {
            .cells-grid { gap: 4px; }
            .cell { min-height: 80px; }
            button { padding: 6px 12px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="game-container" id="app">
    <div id="joinScreen" class="join-panel">
        <h2 style="color:cyan">🎲 Монополия ONLINE</h2>
        <input type="text" id="roomIdInput" placeholder="ID комнаты" value="game123">
        <button id="joinBtn">🔗 Подключиться</button>
        <div id="joinStatus" style="margin-top:20px;color:yellow"></div>
    </div>
    <div id="gameScreen" style="display:none">
        <div class="players-panel">
            <div class="player-card" id="player0Card">
                <div>🔴 Игрок 1</div>
                <div class="money" id="money0">1500</div>
                <div class="props-list" id="props0"></div>
            </div>
            <div class="player-card" id="player1Card">
                <div>🔵 Игрок 2</div>
                <div class="money" id="money1">1500</div>
                <div class="props-list" id="props1"></div>
            </div>
        </div>
        <div class="board">
            <div class="cells-grid" id="boardGrid"></div>
        </div>
        <div class="controls">
            <div class="dice-area"><span id="dice1">⚀</span> + <span id="dice2">⚀</span></div>
            <button id="rollBtn" disabled>🎲 БРОСИТЬ</button>
            <button id="endTurnBtn" disabled>➡️ ЗАВЕРШИТЬ ХОД</button>
            <button id="tradeBtn">🤝 ТОРГИ</button>
            <button id="upgradeBtn">🏗️ УЛУЧШИТЬ</button>
            <button id="resetBtn" style="background:#8b0000">🔄 НОВАЯ ИГРА</button>
        </div>
        <div class="msg" id="msgArea"></div>
    </div>
</div>

<script>
    // ---------- 🔥 ВСТАВЬТЕ ВАШ КОНФИГ FIREBASE ЗДЕСЬ ----------
    const firebaseConfig = {
  apiKey: "AIzaSyDf1n0iqO5hwPcGuRsNva-9D2bu2Hfmti8",
  authDomain: "ghgk-f87eb.firebaseapp.com",
  databaseURL: "https://ghgk-f87eb-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ghgk-f87eb",
  storageBucket: "ghgk-f87eb.firebasestorage.app",
  messagingSenderId: "959499372689",
  appId: "1:959499372689:web:c8a34b55d9f59d9c0e5730"
};
    // ---------------------------------------------------------

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ---------- Игровые данные ----------
    const BOARD_DATA = [
        { id:0, name:"СТАРТ", type:"start", price:0, rent:0, color:"gold" },
        { id:1, name:"Медитерраней", type:"property", price:60, rentBase:4, color:"#bc9a6c", group:"brown", houseCost:50, improvements:0 },
        { id:2, name:"ОБЩ. КАЗНА", type:"chest", price:0 },
        { id:3, name:"Балтик авеню", type:"property", price:60, rentBase:4, color:"#bc9a6c", group:"brown", houseCost:50, improvements:0 },
        { id:4, name:"НАЛОГ $200", type:"tax", price:0, rent:200 },
        { id:5, name:"Чикаго ж/д", type:"railroad", price:200, rent:25, group:"rail" },
        { id:6, name:"Ориентал ав.", type:"property", price:100, rentBase:6, color:"#5dade2", group:"lightblue", houseCost:50, improvements:0 },
        { id:7, name:"ШАНС", type:"chance", price:0 },
        { id:8, name:"Вермонт ав.", type:"property", price:100, rentBase:6, color:"#5dade2", group:"lightblue", houseCost:50, improvements:0 },
        { id:9, name:"Коннектикут", type:"property", price:120, rentBase:8, color:"#5dade2", group:"lightblue", houseCost:50, improvements:0 },
        { id:10, name:"ТЮРЬМА", type:"jail", price:0 },
        { id:11, name:"Сент-Чарльз", type:"property", price:140, rentBase:10, color:"#f5b7b1", group:"pink", houseCost:100, improvements:0 },
        { id:12, name:"ЭЛЕКТРОКОМП.", type:"utility", price:150, rentMulti:4, group:"util" },
        { id:13, name:"Стейтс ав.", type:"property", price:140, rentBase:10, color:"#f5b7b1", group:"pink", houseCost:100, improvements:0 },
        { id:14, name:"Вирджиния ав.", type:"property", price:160, rentBase:12, color:"#f5b7b1", group:"pink", houseCost:100, improvements:0 },
        { id:15, name:"Пенсильвания ж/д", type:"railroad", price:200, rent:25, group:"rail" },
        { id:16, name:"Сент-Джеймс", type:"property", price:180, rentBase:14, color:"#f9e79f", group:"orange", houseCost:100, improvements:0 },
        { id:17, name:"ОБЩ. КАЗНА", type:"chest", price:0 },
        { id:18, name:"Теннесси ав.", type:"property", price:180, rentBase:14, color:"#f9e79f", group:"orange", houseCost:100, improvements:0 },
        { id:19, name:"НЬЮ-ЙОРК ав.", type:"property", price:200, rentBase:16, color:"#f9e79f", group:"orange", houseCost:100, improvements:0 }
    ];

    const RENT_PROGRESSION = {
        "brown": [4, 20, 60, 180, 500, 700],
        "lightblue": [6, 30, 90, 270, 800, 1000],
        "pink": [10, 50, 150, 450, 1200, 1500],
        "orange": [14, 70, 200, 550, 1500, 1800]
    };

    function getInitialState() {
        return {
            boardData: BOARD_DATA,
            players: [
                { id:0, name:"Игрок 1", money:1500, pos:0, inJail:false, jailTurns:0, properties:[], icon:"🔴" },
                { id:1, name:"Игрок 2", money:1500, pos:0, inJail:false, jailTurns:0, properties:[], icon:"🔵" }
            ],
            cellOwner: new Array(BOARD_DATA.length).fill(-1),
            currentPlayer: 0,
            gameActive: true,
            justRolled: false,
            dice1: 1, dice2: 1, diceSum: 2,
            doublesCount: 0,
            waitingAuction: false,
            auction: null,
            timestamp: Date.now()
        };
    }

    let currentRoomRef = null;
    let myPlayerId = null; // 0 или 1
    let localState = null;
    let listenersAttached = false;
    let isMyTurn = false;
    let rollBlocked = false;

    // DOM элементы
    const joinScreen = document.getElementById('joinScreen');
    const gameScreen = document.getElementById('gameScreen');
    const joinBtn = document.getElementById('joinBtn');
    const roomIdInput = document.getElementById('roomIdInput');
    const joinStatus = document.getElementById('joinStatus');
    const rollBtn = document.getElementById('rollBtn');
    const endTurnBtn = document.getElementById('endTurnBtn');
    const tradeBtn = document.getElementById('tradeBtn');
    const upgradeBtn = document.getElementById('upgradeBtn');
    const resetBtn = document.getElementById('resetBtn');
    const msgArea = document.getElementById('msgArea');

    function showMsg(msg, isErr=false) {
        msgArea.innerHTML = isErr ? `⚠️ ${msg}` : `✨ ${msg}`;
        msgArea.style.borderLeftColor = isErr ? "#ff5555" : "#0ff";
        setTimeout(() => {
            if (msgArea.innerHTML === `✨ ${msg}` || msgArea.innerHTML === `⚠️ ${msg}`)
                msgArea.innerHTML = "👉 Ожидание действий...";
        }, 3000);
    }

    // Получение аренды
    function getRent(cell, playerIdx, diceSum) {
        let owner = localState.cellOwner[cell.id];
        if (owner === -1 || owner === playerIdx) return 0;
        if (cell.type === "property") {
            let level = cell.improvements || 0;
            let prog = RENT_PROGRESSION[cell.group];
            return prog ? prog[level] : cell.rentBase;
        }
        if (cell.type === "railroad") {
            let owned = BOARD_DATA.filter(c => c.type==="railroad" && localState.cellOwner[c.id]===owner).length;
            return {1:25,2:50,3:100,4:200}[owned] || 25;
        }
        if (cell.type === "utility") {
            let owned = BOARD_DATA.filter(c => c.type==="utility" && localState.cellOwner[c.id]===owner).length;
            let mult = owned===2 ? 10 : 4;
            return mult * diceSum;
        }
        return 0;
    }

    function hasMonopoly(playerId, group) {
        let groupCells = BOARD_DATA.filter(c => c.type==="property" && c.group === group);
        return groupCells.length > 0 && groupCells.every(c => localState.cellOwner[c.id] === playerId);
    }

    // Обновление UI
    function renderUI() {
        if (!localState) return;
        for (let i=0;i<2;i++) {
            document.getElementById(`money${i}`).innerHTML = localState.players[i].money;
            let propsStr = localState.players[i].properties.map(pid => {
                let cell = BOARD_DATA[pid];
                let lvl = cell.improvements || 0;
                return `${cell.name.substring(0,6)} ${lvl>0? (lvl===5?"🏨":"🏠".repeat(lvl)):""}`;
            }).join(", ");
            document.getElementById(`props${i}`).innerHTML = propsStr || "—";
            const card = document.getElementById(`player${i}Card`);
            if (localState.currentPlayer === i) card.classList.add('active');
            else card.classList.remove('active');
        }
        // Поле
        const grid = document.getElementById('boardGrid');
        grid.innerHTML = "";
        BOARD_DATA.forEach((cell, idx) => {
            const div = document.createElement('div');
            div.className = 'cell';
            let owner = localState.cellOwner[idx];
            let ownerHtml = owner !== -1 ? `<div class="owner">👑 ${localState.players[owner].icon}</div>` : `<div class="owner">🔓</div>`;
            let imprHtml = "";
            if (cell.type==="property" && cell.improvements>0) {
                let lvl = cell.improvements;
                imprHtml = `<div class="improvement">${lvl===5 ? "🏨" : "🏠".repeat(lvl)}</div>`;
            }
            div.innerHTML = `
                <div class="cell-name">${cell.name.substring(0,10)}</div>
                ${cell.price>0 ? `<div>💰${cell.price}</div>` : ""}
                ${ownerHtml}
                ${imprHtml}
                <div class="pawns" id="pawns-${idx}"></div>
            `;
            grid.appendChild(div);
        });
        for (let idx=0; idx<BOARD_DATA.length; idx++) {
            const container = document.getElementById(`pawns-${idx}`);
            if (container) {
                container.innerHTML = "";
                for (let p=0;p<2;p++) {
                    if (localState.players[p].pos === idx) {
                        const pawn = document.createElement('div');
                        pawn.className = `pawn pawn-p${p}`;
                        pawn.innerText = p===0?"1":"2";
                        container.appendChild(pawn);
                    }
                }
            }
        }
        document.getElementById('dice1').innerHTML = getDiceSymbol(localState.dice1);
        document.getElementById('dice2').innerHTML = getDiceSymbol(localState.dice2);
        // Активный игрок
        isMyTurn = (myPlayerId === localState.currentPlayer) && localState.gameActive && !localState.waitingAuction;
        rollBtn.disabled = !(isMyTurn && !localState.justRolled);
        endTurnBtn.disabled = !(isMyTurn && localState.justRolled);
    }

    function getDiceSymbol(v) { const s=["⚀","⚁","⚂","⚃","⚄","⚅"]; return s[v-1]; }

    // Отправка обновления в Firebase
    async function pushState() {
        if (!currentRoomRef) return;
        localState.timestamp = Date.now();
        await currentRoomRef.child('state').set(localState);
    }

    // Логика обработки клетки (возвращает true если начат аукцион)
    async function handleLandOnCell(playerIdx, cellId, diceSum) {
        const cell = BOARD_DATA[cellId];
        const p = localState.players[playerIdx];
        if (cell.type === "start") return false;
        if (cell.type === "tax") {
            p.money -= cell.rent;
            showMsg(`${p.name} заплатил налог ${cell.rent}₽`);
            if (p.money < 0) return checkBankrupt(playerIdx);
            return false;
        }
        if (cell.type === "jail") return false;
        if (cell.type === "chest") { chestAction(playerIdx); return false; }
        if (cell.type === "chance") { chanceAction(playerIdx); return false; }
        if (cell.type === "property" || cell.type === "railroad" || cell.type === "utility") {
            let owner = localState.cellOwner[cell.id];
            if (owner === -1) {
                if (p.money >= cell.price) {
                    let buy = confirm(`${p.name}, купить ${cell.name} за ${cell.price}₽?`);
                    if (buy) {
                        p.money -= cell.price;
                        localState.cellOwner[cell.id] = playerIdx;
                        p.properties.push(cell.id);
                        showMsg(`${p.name} купил ${cell.name}`);
                        return false;
                    } else {
                        showMsg(`Отказ. Аукцион!`);
                        startAuction(cell.id, cell.price);
                        return true;
                    }
                } else {
                    showMsg(`Не хватает денег. Аукцион!`);
                    startAuction(cell.id, cell.price);
                    return true;
                }
            } else if (owner !== playerIdx) {
                let rent = getRent(cell, playerIdx, diceSum);
                if (rent > 0) {
                    p.money -= rent;
                    localState.players[owner].money += rent;
                    showMsg(`${p.name} платит аренду ${rent}₽ ${localState.players[owner].name} за ${cell.name}`);
                    if (p.money < 0) checkBankrupt(playerIdx);
                }
            }
        }
        return false;
    }

    function chestAction(pIdx) {
        const events = [{val:200},{val:100},{val:-150},{val:300},{val:-50},{move:0,add:200}];
        const e = events[Math.floor(Math.random()*events.length)];
        const p = localState.players[pIdx];
        if (e.val) { p.money += e.val; showMsg(`Общ. казна: ${e.val>=0 ? `+${e.val}` : e.val}₽`); }
        if (e.move !== undefined) {
            let old = p.pos;
            p.pos = e.move;
            if (old > p.pos) p.money += 200;
            if (e.add) p.money += e.add;
            showMsg(`Перемещение на СТАРТ +200₽`);
        }
        if (p.money < 0) checkBankrupt(pIdx);
    }
    function chanceAction(pIdx) {
        const events = [{move:0,add:200},{jail:true},{val:-100},{val:50},{move:11},{val:150}];
        const e = events[Math.floor(Math.random()*events.length)];
        const p = localState.players[pIdx];
        if (e.val) { p.money += e.val; showMsg(`Шанс: ${e.val>=0 ? `+${e.val}` : e.val}₽`); }
        if (e.move !== undefined) {
            let old = p.pos;
            p.pos = e.move;
            if (old > p.pos && e.move !== 0) p.money += 200;
            if (e.add) p.money += e.add;
            showMsg(`Шанс: переход на ${BOARD_DATA[p.pos].name}`);
        }
        if (e.jail) { p.inJail = true; p.pos = 10; p.jailTurns = 0; showMsg(`Тюрьма!`); }
        if (p.money < 0) checkBankrupt(pIdx);
    }
    function checkBankrupt(pIdx) {
        if (localState.players[pIdx].money < 0) {
            localState.players[pIdx].money = 0;
            localState.gameActive = false;
            showMsg(`${localState.players[pIdx].name} банкрот! Победил ${localState.players[1-pIdx].name} 🎉`, true);
            return true;
        }
        return false;
    }

    function startAuction(cellId, startPrice) {
        localState.waitingAuction = true;
        localState.auction = { cellId, currentBid: startPrice, currentBidder: -1, nextBidder: (localState.currentPlayer === 0 ? 1 : 0) };
        pushState();
        // Открываем модалку для текущего игрока, если его очередь
        processAuctionTurn();
    }

    function processAuctionTurn() {
        if (!localState.auction) return;
        const auction = localState.auction;
        const activePlayerId = auction.nextBidder % 2;
        auction.nextBidder++;
        if (activePlayerId === myPlayerId) {
            showModalAuction(auction.cellId, auction.currentBid, auction.currentBidder, activePlayerId, (newBid, skip) => {
                if (skip) {
                    if (auction.currentBidder === -1) endAuction(null);
                    else endAuction(auction.currentBidder, auction.currentBid);
                } else if (newBid !== undefined && newBid > auction.currentBid) {
                    if (localState.players[activePlayerId].money >= newBid) {
                        auction.currentBid = newBid;
                        auction.currentBidder = activePlayerId;
                        showMsg(`${localState.players[activePlayerId].name} поднимает до ${newBid}₽`);
                        pushState();
                        processAuctionTurn();
                    } else {
                        showMsg(`Недостаточно денег, пропуск`);
                        processAuctionTurn();
                    }
                } else {
                    processAuctionTurn();
                }
            });
        } else {
            // ждём хода другого игрока (он получит модалку через событие)
        }
    }

    function showModalAuction(cellId, currentBid, currentBidder, activePlayerId, callback) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        const cell = BOARD_DATA[cellId];
        modal.innerHTML = `
            <div class="modal-card">
                <h3>🏆 АУКЦИОН: ${cell.name}</h3>
                <p>Текущая ставка: <strong>${currentBid}₽</strong> ${currentBidder!==-1 ? `(игрок ${localState.players[currentBidder].icon})` : ""}</p>
                <p>💰 Ваши деньги: ${localState.players[activePlayerId].money}₽</p>
                <input type="number" id="bidAmount" class="bid-input" value="${currentBid+10}" min="${currentBid+5}" step="5">
                <div class="flex">
                    <button id="bidBtn">💰 ПОВЫСИТЬ</button>
                    <button id="skipBtn">⏭️ ПРОПУСК</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        const bidInput = modal.querySelector('#bidAmount');
        const bidBtn = modal.querySelector('#bidBtn');
        const skipBtn = modal.querySelector('#skipBtn');
        const cleanup = () => modal.remove();
        bidBtn.onclick = () => {
            let newVal = parseInt(bidInput.value);
            if (isNaN(newVal)) newVal = currentBid+10;
            if (newVal > currentBid && newVal <= localState.players[activePlayerId].money) {
                cleanup();
                callback(newVal, false);
            } else alert(`Ставка должна быть выше ${currentBid} и в пределах ваших денег`);
        };
        skipBtn.onclick = () => { cleanup(); callback(undefined, true); };
    }

    function endAuction(winnerId, finalPrice) {
        if (winnerId !== null && finalPrice !== undefined) {
            const cellId = localState.auction.cellId;
            localState.players[winnerId].money -= finalPrice;
            localState.cellOwner[cellId] = winnerId;
            localState.players[winnerId].properties.push(cellId);
            showMsg(`Игрок ${localState.players[winnerId].name} выиграл аукцион за ${finalPrice}₽ и получил ${BOARD_DATA[cellId].name}!`);
        } else {
            showMsg(`Аукцион без победителя, клетка свободна.`);
        }
        localState.waitingAuction = false;
        localState.auction = null;
        pushState();
    }

    async function rollDice() {
        if (!isMyTurn || localState.justRolled) return;
        let p = localState.players[myPlayerId];
        // Тюремная механика
        if (p.inJail) {
            let choice = confirm(`В тюрьме. Заплатить 50₽ и выйти? (Отмена - бросок дубля)`);
            if (choice && p.money >= 50) {
                p.money -= 50;
                p.inJail = false;
                showMsg(`Выход за 50₽`);
                pushState();
                renderUI();
                return;
            } else {
                let d1 = Math.floor(Math.random()*6)+1, d2 = Math.floor(Math.random()*6)+1;
                localState.dice1 = d1; localState.dice2 = d2; localState.diceSum = d1+d2;
                if (d1 === d2) {
                    p.inJail = false;
                    showMsg(`Дубль! Выход из тюрьмы, ход на ${d1+d2}`);
                    await moveAndLand(myPlayerId, d1+d2);
                    localState.justRolled = true;
                    if (d1 === d2) { localState.justRolled = false; rollDice(); }
                } else {
                    p.jailTurns++;
                    showMsg(`Не дубль, остаётесь (${p.jailTurns}/3)`);
                    if (p.jailTurns >= 3 && p.money >= 50) { p.money -= 50; p.inJail = false; showMsg(`Принудительный выход за 50₽`); }
                    localState.justRolled = true;
                }
                pushState();
                renderUI();
                return;
            }
        }
        let d1 = Math.floor(Math.random()*6)+1, d2 = Math.floor(Math.random()*6)+1;
        localState.dice1 = d1; localState.dice2 = d2; localState.diceSum = d1+d2;
        showMsg(`${p.name} бросает ${d1}+${d2}=${d1+d2}`);
        await moveAndLand(myPlayerId, d1+d2);
        localState.justRolled = true;
        if (d1 === d2) {
            localState.doublesCount++;
            if (localState.doublesCount === 3) {
                goToJail(myPlayerId);
                localState.doublesCount = 0;
                localState.justRolled = true;
            } else {
                showMsg(`ДУБЛЬ! Дополнительный ход!`);
                localState.justRolled = false;
                rollDice();
                return;
            }
        } else {
            localState.doublesCount = 0;
        }
        pushState();
        renderUI();
    }

    async function moveAndLand(pid, steps) {
        let p = localState.players[pid];
        let oldPos = p.pos;
        let newPos = (oldPos + steps) % BOARD_DATA.length;
        if (newPos < oldPos) {
            p.money += 200;
            showMsg(`Проход СТАРТА +200₽`);
        }
        p.pos = newPos;
        pushState();
        let auctionStarted = await handleLandOnCell(pid, newPos, steps);
        if (auctionStarted) {
            // аукцион уже запущен
        }
        pushState();
        renderUI();
        if (localState.players[pid].money < 0) checkBankrupt(pid);
    }

    function goToJail(pid) {
        localState.players[pid].inJail = true;
        localState.players[pid].pos = 10;
        localState.players[pid].jailTurns = 0;
        showMsg(`${localState.players[pid].name} отправляется в тюрьму!`);
        pushState();
    }

    function endTurn() {
        if (!isMyTurn || !localState.justRolled) return;
        localState.justRolled = false;
        localState.currentPlayer = localState.currentPlayer === 0 ? 1 : 0;
        pushState();
        showMsg(`Ход переходит к ${localState.players[localState.currentPlayer].name}`);
        renderUI();
    }

    function openUpgradePanel() {
        if (!isMyTurn) { showMsg("Сейчас не ваш ход", true); return; }
        let p = localState.players[myPlayerId];
        let ownedProps = p.properties.filter(pid => BOARD_DATA[pid].type === "property");
        let groups = new Set();
        for (let pid of ownedProps) {
            let cell = BOARD_DATA[pid];
            if (hasMonopoly(myPlayerId, cell.group)) groups.add(cell.group);
        }
        if (groups.size === 0) {
            showMsg("Нет полной цветовой группы для строительства", true);
            return;
        }
        let modal = document.createElement('div'); modal.className = 'modal';
        let html = `<div class="modal-card"><h3>🏗️ Улучшения</h3>`;
        for (let pid of ownedProps) {
            let cell = BOARD_DATA[pid];
            if (hasMonopoly(myPlayerId, cell.group)) {
                let level = cell.improvements || 0;
                let cost = level===4 ? cell.houseCost*2 : cell.houseCost;
                let sell = level>0 ? (level===5 ? cell.houseCost : Math.floor(cell.houseCost/2)) : 0;
                html += `<div class="property-row" style="display:flex; justify-content:space-between; margin:8px 0">
                            <span>${cell.name} (🏠${level})</span>
                            <div>
                                ${level<5 ? `<button class="upgrade-act" data-id="${pid}" style="margin:0 4px">➕ ${cost}₽</button>` : ''}
                                ${level>0 ? `<button class="downgrade-act" data-id="${pid}" style="margin:0 4px">➖ ${sell}₽</button>` : ''}
                            </div>
                        </div>`;
            }
        }
        html += `<div class="flex"><button id="closeUpgrade">ЗАКРЫТЬ</button></div></div>`;
        modal.innerHTML = html;
        document.body.appendChild(modal);
        modal.querySelectorAll('.upgrade-act').forEach(btn => {
            btn.onclick = () => {
                let pid = parseInt(btn.dataset.id);
                let cell = BOARD_DATA[pid];
                let level = cell.improvements || 0;
                let cost = level===4 ? cell.houseCost*2 : cell.houseCost;
                if (localState.players[myPlayerId].money >= cost && level < 5) {
                    let groupCells = BOARD_DATA.filter(c => c.group === cell.group && c.type==="property");
                    let levels = groupCells.map(c => c.improvements || 0);
                    if (Math.min(...levels) < level) {
                        showMsg("Нельзя: все улицы группы должны быть застроены равномерно", true);
                        modal.remove();
                        return;
                    }
                    localState.players[myPlayerId].money -= cost;
                    cell.improvements = level+1;
                    showMsg(`${cell.name} улучшен до уровня ${cell.improvements}`);
                    pushState();
                    renderUI();
                    modal.remove();
                } else showMsg("Недостаточно денег", true);
            };
        });
        modal.querySelectorAll('.downgrade-act').forEach(btn => {
            btn.onclick = () => {
                let pid = parseInt(btn.dataset.id);
                let cell = BOARD_DATA[pid];
                let level = cell.improvements || 0;
                let sell = level===5 ? cell.houseCost : Math.floor(cell.houseCost/2);
                if (level > 0) {
                    cell.improvements = level-1;
                    localState.players[myPlayerId].money += sell;
                    showMsg(`Проданы улучшения на ${cell.name}, получено ${sell}₽`);
                    pushState();
                    renderUI();
                    modal.remove();
                }
            };
        });
        modal.querySelector('#closeUpgrade').onclick = () => modal.remove();
    }

    function openTradeModal() {
        if (!localState.gameActive) return;
        let p0=localState.players[0], p1=localState.players[1];
        let props0 = p0.properties.map(pid=>BOARD_DATA[pid].name).join(", ") || "нет";
        let props1 = p1.properties.map(pid=>BOARD_DATA[pid].name).join(", ") || "нет";
        let modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-card">
                <h3>🤝 ТОРГИ / ОБМЕН</h3>
                <div style="display:flex; gap:20px; margin:10px 0">
                    <div><strong>🔴 Игрок1</strong><br>💰 ${p0.money}<br>🏠 ${props0}</div>
                    <div><strong>🔵 Игрок2</strong><br>💰 ${p1.money}<br>🏠 ${props1}</div>
                </div>
                <input type="number" id="tradeMoney" placeholder="Сумма перевода (от 1 к 2, отрицательная - обратно)" style="margin:6px; padding:8px; border-radius:30px; width:90%">
                <input id="tradeProps0" placeholder="ID участков от Игрока1 (через пробел)" style="margin:6px; padding:8px; border-radius:30px; width:90%">
                <input id="tradeProps1" placeholder="ID участков от Игрока2 (через пробел)" style="margin:6px; padding:8px; border-radius:30px; width:90%">
                <div class="flex"><button id="doTrade">✅ ПРЕДЛОЖИТЬ</button><button id="cancelTrade">❌ ОТМЕНА</button></div>
            </div>
        `;
        document.body.appendChild(modal);
        const doBtn = modal.querySelector('#doTrade');
        const cancel = modal.querySelector('#cancelTrade');
        doBtn.onclick = () => {
            let moneyVal = parseInt(modal.querySelector('#tradeMoney').value) || 0;
            let props0list = modal.querySelector('#tradeProps0').value.split(" ").map(Number).filter(v=>!isNaN(v) && localState.players[0].properties.includes(v));
            let props1list = modal.querySelector('#tradeProps1').value.split(" ").map(Number).filter(v=>!isNaN(v) && localState.players[1].properties.includes(v));
            if (moneyVal >= 0 && localState.players[0].money >= moneyVal) {
                localState.players[0].money -= moneyVal;
                localState.players[1].money += moneyVal;
            } else if (moneyVal < 0 && localState.players[1].money >= -moneyVal) {
                localState.players[1].money -= -moneyVal;
                localState.players[0].money += -moneyVal;
            }
            for (let pid of props0list) {
                if (localState.cellOwner[pid] === 0) {
                    localState.cellOwner[pid] = 1;
                    localState.players[0].properties = localState.players[0].properties.filter(p=>p!==pid);
                    localState.players[1].properties.push(pid);
                }
            }
            for (let pid of props1list) {
                if (localState.cellOwner[pid] === 1) {
                    localState.cellOwner[pid] = 0;
                    localState.players[1].properties = localState.players[1].properties.filter(p=>p!==pid);
                    localState.players[0].properties.push(pid);
                }
            }
            showMsg("Сделка выполнена!");
            pushState();
            renderUI();
            modal.remove();
        };
        cancel.onclick = () => modal.remove();
    }

    function resetGame() {
        if (myPlayerId !== 0) { showMsg("Только создатель комнаты может сбросить игру", true); return; }
        localState = getInitialState();
        pushState();
        renderUI();
        showMsg("Игра сброшена!");
    }

    // Подключение к Firebase
    joinBtn.onclick = async () => {
        const roomId = roomIdInput.value.trim();
        if (!roomId) return;
        joinStatus.innerText = "Подключение...";
        currentRoomRef = db.ref('games/' + roomId);
        // Проверяем количество игроков
        const snapshot = await currentRoomRef.child('players').once('value');
        let playersCount = snapshot.val() || 0;
        if (playersCount >= 2) {
            joinStatus.innerText = "Комната полна!";
            return;
        }
        myPlayerId = playersCount; // 0 или 1
        await currentRoomRef.child('players').set(playersCount + 1);
        // Создаём или получаем состояние
        const stateSnap = await currentRoomRef.child('state').once('value');
        if (!stateSnap.exists()) {
            localState = getInitialState();
            await currentRoomRef.child('state').set(localState);
        } else {
            localState = stateSnap.val();
        }
        // Слушаем изменения
        currentRoomRef.child('state').on('value', (snap) => {
            if (snap.exists()) {
                localState = snap.val();
                renderUI();
                if (localState.waitingAuction && localState.auction && localState.auction.nextBidder % 2 === myPlayerId && localState.gameActive) {
                    processAuctionTurn();
                }
            }
        });
        currentRoomRef.onDisconnect().removeValue(); // очистка при отключении
        joinScreen.style.display = 'none';
        gameScreen.style.display = 'block';
        renderUI();
        showMsg(`Вы игрок ${myPlayerId+1}. Ждём хода...`);
    };

    rollBtn.onclick = rollDice;
    endTurnBtn.onclick = endTurn;
    upgradeBtn.onclick = openUpgradePanel;
    tradeBtn.onclick = openTradeModal;
    resetBtn.onclick = resetGame;
</script>
</body>
</html>
